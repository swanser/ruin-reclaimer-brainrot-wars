<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RUIN RECLAIMER | BRAINROT WARS</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&amp;display=swap');
    
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #0a0a0a; 
      color: #c9b896; 
      font-family: 'VT323', monospace;
      font-size: 18px;
      line-height: 1.2;
    }
    
    canvas { display: block; }
    
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(15, 12, 8, 0.92);
      border: 2px solid #665533;
      padding: 8px 14px;
      max-width: 320px;
      box-shadow: 0 0 0 4px #221a11;
    }
    
    #status {
      font-size: 20px;
      margin-bottom: 4px;
      color: #d4c8a0;
    }
    
    /* Character Sheet */
    #character-sheet {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      max-height: 75vh;
      background: rgba(12, 10, 7, 0.97);
      border: 3px solid #776644;
      box-shadow: 0 0 0 6px #221a11,
                  inset 0 0 40px rgba(0,0,0,0.6);
      padding: 16px 22px;
      display: none;
      z-index: 100;
      overflow-y: auto;
      font-size: 17px;
    }
    
    #character-sheet h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      color: #d4c8a0;
      border-bottom: 1px solid #554422;
      padding-bottom: 4px;
    }
    
    .section {
      margin-bottom: 14px;
    }
    
    .section-title {
      color: #aa8866;
      font-size: 20px;
      margin-bottom: 4px;
      border-bottom: 1px dotted #554422;
    }
    
    .backstory {
      font-style: italic;
      color: #998866;
      margin: 6px 0;
      padding: 6px;
      background: rgba(0,0,0,0.3);
    }
    
    .stat-row {
      display: flex;
      justify-content: space-between;
      margin: 2px 0;
    }
    
    .trait {
      background: #332211;
      padding: 4px 8px;
      margin: 3px 0;
      border-left: 3px solid #aa6644;
    }
    
    .skill {
      display: flex;
      justify-content: space-between;
      margin: 1px 0;
    }
    
    .equipment-slot {
      background: #221a11;
      padding: 3px 8px;
      margin: 2px 0;
      display: flex;
      justify-content: space-between;
    }
    
    .inventory-item {
      background: #2a2218;
      padding: 2px 8px;
      margin: 1px 0;
      font-size: 16px;
    }
    
    .close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: #442211;
      border: 1px solid #aa6644;
      color: #c9b896;
      padding: 2px 10px;
      cursor: pointer;
      font-family: 'VT323', monospace;
      font-size: 18px;
    }
    
    .close-btn:hover {
      background: #663322;
    }
  </style>
</head>
<body>
  <!-- Top Status Bar -->
  <div id="ui">
    <div id="status">YOU | H:100 Hu:55 Th:45 San:75 | Inv:3</div>
    <div style="font-size:14px; color:#776644;">Left-click self or press TAB for Character Sheet</div>
  </div>

  <!-- Character Sheet Panel -->
  <div id="character-sheet">
    <button class="close-btn" onclick="hideCharacterSheet()">CLOSE [X]</button>
    
    <h1 id="sheet-name">YOU</h1>
    
    <div class="section">
      <div class="section-title">BACKSTORY</div>
      <div id="sheet-backstory" class="backstory"></div>
    </div>
    
    <div class="section">
      <div class="section-title">TRAITS</div>
      <div id="sheet-traits"></div>
    </div>
    
    <div class="section">
      <div class="section-title">SKILLS</div>
      <div id="sheet-skills"></div>
    </div>
    
    <div class="section">
      <div class="section-title">EQUIPMENT</div>
      <div id="sheet-equipment"></div>
    </div>
    
    <div class="section">
      <div class="section-title">INVENTORY</div>
      <div id="sheet-inventory"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
